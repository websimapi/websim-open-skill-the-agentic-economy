    <style>
        body {
            background-color: #050508;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0f;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a35;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00f3ff;
        }

        .neon-glow {
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }
        
        .neon-text {
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .focus-meter-bg {
            background: conic-gradient(from 0deg, #00f3ff 0%, #00ff9d 50%, #b026ff 100%);
            filter: blur(20px);
            opacity: 0.2;
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.4; }
        }
        
        .animate-pulse-slow {
            animation: pulse-slow 3s infinite;
        }

        .markdown-body h1 { font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem; color: #fff; }
        .markdown-body h2 { font-size: 1.25rem; font-weight: bold; margin-bottom: 0.75rem; margin-top: 1.5rem; color: #e0e0e0; }
        .markdown-body p { margin-bottom: 1rem; line-height: 1.6; }
        .markdown-body code { background: #1a1a25; padding: 0.2rem 0.4rem; border-radius: 4px; color: #00ff9d; font-family: 'JetBrains Mono', monospace; }
        .markdown-body pre { background: #13131f; padding: 1rem; border-radius: 8px; overflow-x: auto; margin-bottom: 1rem; border: 1px solid #2a2a35; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body blockquote { border-left: 4px solid #00f3ff; padding-left: 1rem; color: #a0a0b0; font-style: italic; }

    </style>
